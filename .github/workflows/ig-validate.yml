name: Validate IG

on:
  pull_request:
  push:
    # Default-Branch + isolierter Migrations-Branch (Spec §5a); PR-Validierung
    # übernimmt der pull_request-Trigger — "**" erzeugte Doppel-Builds je PR-Commit.
    branches: [ "main", "hl7-ig-build" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Etablierte Community-Action (führt SUSHI + IG Publisher aus, inkl. Java/Heap).
      # Hinweis: Drittanbieter, NICHT von GitHub/HL7 zertifiziert. Version regelmäßig prüfen:
      # https://github.com/marketplace/actions/fhir-ig-action
      - name: Build IG (SUSHI + IG Publisher)
        uses: qligier/fhir-ig-action@v0.3.0
        with:
          java-max-heap-memory: 6G

      - name: Upload QA & Package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ig-output
          path: |
            output/qa.html
            output/qa.txt
            output/full-ig.zip
            output/package.tgz

# --- Alternative ohne Drittanbieter-Action: lokal/CI via ./_genonce.sh
#     (SUSHI + HL7 IG Publisher publisher.jar direkt). Siehe _genonce.sh.
