name: CI (FHIR Validation & Release)

# Nutzt die offiziellen MII-Reusable-Workflows aus kerndatensatz-meta
# (siehe Meta-Wiki „GitHub Reusable Validation Workflows"). DOTNET-Job führt die
# Simplifier-/Firely-QC (qc/custom.rules.yaml) aus; JAVA-Job validiert gegen den
# MII-Terminologieserver (SU-TermServ) und nutzt advisor.json zur Unterdrückung
# bekannter Meldungen.
on:
  push:
    branches: [ master, main ]
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+*' ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  DOTNET_FHIR_VALIDATION:
    if: github.event_name != 'release'
    uses: medizininformatik-initiative/kerndatensatz-meta/.github/workflows/ci_dotnet_validation.yml@master
    with:
      ref: ${{ github.event.pull_request.head.ref || github.ref }}
      SUSHI_VERSION: ${{ vars.SUSHI_VERSION }}
    secrets: inherit

  JAVA_FHIR_VALIDATION:
    if: github.event_name != 'release'
    uses: medizininformatik-initiative/kerndatensatz-meta/.github/workflows/ci_java_validation.yml@master
    with:
      ref: ${{ github.event.pull_request.head.ref || github.ref }}
      PATH_TO_CONFORMANCE_RESOURCES: fsh-generated/resources
      PATH_TO_EXAMPLES: fsh-generated/resources
      JAVA_VALIDATION_ENABLED: true
      JAVA_VALIDATION_OPTIONS: ${{ vars.JAVA_VALIDATION_OPTIONS }}
      JAVA_VALIDATOR_VERSION: ${{ vars.JAVA_VALIDATOR_VERSION }}
    secrets: inherit

  RELEASE:
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name != 'release'
    needs: [ DOTNET_FHIR_VALIDATION, JAVA_FHIR_VALIDATION ]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # softprops/action-gh-release benötigt Schreibrecht für Releases
    steps:
      - uses: actions/checkout@v4
      - id: prep-version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.prep-version.outputs.version }}"
          draft: true
          prerelease: ${{ contains(steps.prep-version.outputs.version, '-') }}
          generate_release_notes: true
          body: |
            ## Inoffizielle Vorlage – Release ${{ steps.prep-version.outputs.version }}
            ### Changes
            (Eigene Release Notes hier ergänzen; siehe auch CHANGELOG.md.)

  NOTIFY_ZULIP:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
      - name: Post release to Zulip
        uses: zulip/github-actions-zulip/send-message@v2
        with:
          api-key: ${{ secrets.ZULIP_API_KEY }}
          email: "kds-github-bot@mii.zulipchat.com"
          organization-url: "https://mii.zulipchat.com/"
          to: "MII-Kerndatensatz"
          type: "stream"
          topic: "Releases"
          content: |
            **New Release:** `${{ github.event.release.tag_name }}`
            **Repository:** `${{ github.repository }}`

            ${{ github.event.release.body }}

            🔗 [View on GitHub](${{ github.event.release.html_url }})
