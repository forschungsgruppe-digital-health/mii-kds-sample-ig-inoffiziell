name: Publish IG to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build IG (SUSHI + IG Publisher)
        uses: qligier/fhir-ig-action@v0.3.0   # Community-Action, nicht zertifiziert
        with:
          java-max-heap-memory: 6G
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output   # gerendertes IG (HTML), inkl. /de/ und /en/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
