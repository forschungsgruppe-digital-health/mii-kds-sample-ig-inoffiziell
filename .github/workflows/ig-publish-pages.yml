name: Publish IG to GitHub Pages

on:
  push:
    # In diesem Template-Repo wird aus `main` publiziert. Bei Anwendung auf ein
    # bestehendes Modul-Repo (MIGRATION.md §11, Spec §5a.3) den Filter auf den
    # isolierten Branch umstellen: branches: [ "hl7-ig-build" ] — dev/master/main
    # bleiben unberührt.
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build IG (SUSHI + IG Publisher)
        uses: qligier/fhir-ig-action@v0.3.0   # Community-Action, nicht zertifiziert
        with:
          # qligier/fhir-ig-action@v0.3.0 kennt NUR die Inputs `sushi` und `ig-publisher`.
          # sushi defaultet auf 'false' -> ohne diesen Input: "Cannot run program sushi".
          sushi: latest
          ig-publisher: latest
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output   # gerendertes IG (HTML), inkl. /de/ und /en/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
